<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분수/소수 타임어택</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f7fb;
    }
    #hud {
      width: 18rem;
      margin-bottom: 1.5rem;
    }
    #hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    #hearts {
      font-size: 1.5rem;
    }
    #score {
      font-size: 1.1rem;
      font-weight: bold;
      color: #1f2937;
    }
    #timer-bar {
      height: 0.7rem;
      border-radius: 6px;
      background: #d9dee8;
      overflow: hidden;
    }
    #timer-fill {
      height: 100%;
      width: 100%;
      background: #2563eb;
      border-radius: 6px;
    }
    #prompt {
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }
    #question {
      font-size: 2.2rem;
      font-weight: bold;
      margin: 0 0 1.5rem;
    }
    #question[hidden] { display: none; }
    #choices {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    /* 사지선다: 2×2 그리드, 표기가 길어지므로 폰트를 한 단계 줄인다 */
    #choices.quad {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
    }
    #choices.quad .choice {
      font-size: 1.8rem;
    }
    .choice {
      font-size: 2.5rem;
      padding: 1.2rem 2rem;
      min-width: 7rem;
      border: 2px solid #444;
      border-radius: 12px;
      background: white;
      cursor: pointer;
    }
    .choice:disabled {
      cursor: default;
      opacity: 0.6;
    }
    #vs {
      font-size: 1.5rem;
      color: #888;
    }
    #feedback {
      font-size: 1.5rem;
      margin-top: 1.5rem;
      min-height: 2rem;
    }
    #feedback.correct { color: #1a7f37; }
    #feedback.wrong { color: #d1242f; }
    #next {
      font-size: 1.2rem;
      padding: 0.6rem 2rem;
      margin-top: 1rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    #next[hidden] { display: none; }
    #gameover {
      text-align: center;
      margin-top: 1rem;
    }
    #gameover[hidden] { display: none; }
    #gameover p {
      font-size: 1.8rem;
      margin: 0 0 0.8rem;
    }
    #gameover #final-score {
      font-size: 1.2rem;
      color: #374151;
    }
    #restart {
      font-size: 1.2rem;
      padding: 0.6rem 2rem;
      border: none;
      border-radius: 8px;
      background: #d1242f;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-top">
      <span id="hearts"></span>
      <span id="score"></span>
    </div>
    <div id="timer-bar"><div id="timer-fill"></div></div>
  </div>
  <p id="prompt"></p>
  <p id="question" hidden></p>
  <div id="choices"><!-- 보기 버튼은 game.js가 문제 유형에 맞춰 그린다 --></div>
  <p id="feedback"></p>
  <button id="next" hidden>다음 문제</button>
  <div id="gameover" hidden>
    <p>💀 게임 오버</p>
    <p id="final-score"></p>
    <button id="restart">다시 시작</button>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
