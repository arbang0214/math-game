<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분수/소수 타임어택</title>
  <link rel="stylesheet" href="style.css">
  <!-- 게임오버 컷 2장은 첫 게임오버 때 팝인하지 않도록 미리 받는다 -->
  <link rel="preload" as="image" href="assets/rabbit-cheer.png">
  <link rel="preload" as="image" href="assets/rabbit-sad.png">
</head>
<body>
  <!-- 당근 목숨 아이콘 — game.js renderHearts가 <use>로 참조한다 -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="carrot-icon" viewBox="0 0 24 26">
      <g transform="rotate(8 12 13)">
        <path d="M10.5 7 Q7 3.5 4.5 4.5 Q7.5 6.5 9.5 8 Z" fill="#3fbf6f"/>
        <path d="M12 6.5 Q11.5 2 9 1 Q10 5 11 7.5 Z" fill="#4ade80"/>
        <path d="M13.5 7 Q16.5 3 19 4 Q16 6.5 14.5 8 Z" fill="#3fbf6f"/>
        <path d="M12 7 Q16.5 7 15.5 13.5 Q14.5 21 12 24.5 Q9.5 21 8.5 13.5 Q7.5 7 12 7 Z" fill="#ff8c42"/>
        <path d="M9.8 12 L13.6 11.4 M10.4 16 L13.2 15.5" stroke="#e0702a" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      </g>
    </symbol>
  </svg>
  <main id="game">
    <div id="hud">
      <span id="hearts" role="img"></span>
      <span id="level"></span>
      <span id="score"></span>
    </div>
    <div id="timer-bar"><div id="timer-fill"></div></div>

    <div id="stage">
      <!-- 리본 토끼 마스코트 — AI 생성 PNG 4장을 겹쳐 두고 data-face로 전환.
           img 태그는 display:none이어도 전부 로드되므로 전환 깜빡임이 없다 -->
      <div id="mascot" data-face="idle">
        <img class="face face-idle" src="assets/rabbit-idle.png" alt="">
        <img class="face face-happy" src="assets/rabbit-happy.png" alt="">
        <img class="face face-dizzy" src="assets/rabbit-dizzy.png" alt="">
        <img class="face face-worried" src="assets/rabbit-worried.png" alt="">
      </div>
      <div id="bubble"><p id="prompt"></p></div>
    </div>

    <p id="question" hidden></p>
    <!-- 보기+피드백+다음 묶음 — 남는 세로 공간의 중앙에 배치 (style.css #answer-area) -->
    <div id="answer-area">
      <div id="choices"><!-- 보기 버튼은 game.js가 문제 유형에 맞춰 그린다 --></div>
      <p id="feedback"></p>
      <button id="next" hidden>다음 문제</button>
    </div>
  </main>

  <div id="gameover" hidden>
    <div class="panel">
      <!-- 스크롤은 panel-body가 담당 — 신기록 별(::before/::after)은 panel에 남아 잘리지 않는다 -->
      <div class="panel-body">
      <img id="gameover-cut" alt="">
      <p class="title">게임 오버</p>
      <p id="final-score"></p>
      <div id="leaderboard" hidden>
        <p class="lb-title">🏆 전체 TOP 10</p>
        <ol id="ranking"></ol>
        <p id="lb-status"></p>
        <div class="lb-form">
          <input id="nickname" maxlength="8" placeholder="별명 (1~8자)" aria-label="별명" autocomplete="off">
          <button id="submit-score">등록</button>
        </div>
        <p class="lb-hint">실명 말고 별명을 써 주세요</p>
      </div>
      <button id="restart">다시 시작</button>
      </div>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
